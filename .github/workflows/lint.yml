name: Lint & Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run black
        run: poetry run black --check vk_teams_async_bot/ tests/

      - name: Run isort
        run: poetry run isort --check-only vk_teams_async_bot/ tests/

      - name: Run pyright
        run: poetry run pyright

      - name: Type check (mypy)
        run: poetry run mypy vk_teams_async_bot/
